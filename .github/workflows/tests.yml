name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install OpenMP (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Install package with test dependencies
        run: pip install ".[tests,plotting,units]" -v

      - name: Run tests
        run: >
          python -m pytest tests/ -vv
          --pyargs deeptime --doctest-modules
          --durations=20 --numprocesses=2

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: >
          python -m pytest tests/ -vv
          --pyargs deeptime --doctest-modules
          --durations=20
          --cov=deeptime --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml

  cpp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install pybind11 cmake ninja numpy scipy

      - name: Configure and build C++ tests
        run: |
          cmake -S . -B build-cpp \
            -DDEEPTIME_BUILD_CPP_TESTS=ON \
            -Dpybind11_DIR=$(python -m pybind11 --cmakedir) \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-cpp --target run_tests
